<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Lumio | Go from AI-curious to AI-confident</title>
    <meta
      name="description"
      content="Daily lessons, a few minutes each, that teach knowledge workers to actually use AI at work. Learn for free, then earn a certificate a real person reviews." />
    <link rel="canonical" href="https://lumio.app/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Lumio" />
    <meta property="og:url" content="https://lumio.app/" />
    <meta property="og:title" content="Lumio | Go from AI-curious to AI-confident" />
    <meta property="og:description" content="Daily lessons, a few minutes each, that teach knowledge workers to actually use AI at work." />

    <!-- Twitter -->
    <!-- summary (not summary_large_image): with no branded image asset yet, the
         large-image card renders a blank panel. Plain summary degrades cleanly. -->
    <meta property="twitter:card" content="summary" />
    <meta property="twitter:title" content="Lumio | Go from AI-curious to AI-confident" />
    <meta property="twitter:description" content="Daily lessons, a few minutes each, that teach knowledge workers to actually use AI at work." />

    <!-- Organization structured data so search engines and link scrapers can
         attribute the brand consistently. Credential-level JSON-LD is injected
         per certificate on the Verify page (Expansionist H2). -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Lumio",
        "url": "https://lumio.app/",
        "description": "Daily lessons, a few minutes each, that teach knowledge workers to actually use AI at work."
      }
    </script>

    <!-- Google Fonts: Fraunces (serif, variable weights, italics) and DM Sans (sans-serif) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
